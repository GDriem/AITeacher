apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: learning-mcp
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: learning-mcp@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/agent-mcp-run/mcp-server:TAG
          ports:
            - containerPort: 8080
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            - name: MCP_PROGRESS_BACKEND
              value: firestore
            - name: FIRESTORE_PROGRESS_COLLECTION
              value: student_progress
            - name: MCP_ALLOWED_HOSTS
              value: MCP_SERVICE_HOST
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 10
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
