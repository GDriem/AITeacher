services:
  agent-app:
    build:
      context: .
      dockerfile: agent_app/Dockerfile
    environment:
      APP_PORT: "8080"
      APP_SESSIONS_BACKEND: local
      APP_SESSIONS_PATH: /data/sessions.json
      APP_SESSION_RETENTION_DAYS: ${APP_SESSION_RETENTION_DAYS:-365}
      APP_AUTHORING_TOKEN: ${AUTHORING_TOKEN:-}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-20}
      MCP_USE_LOCAL_ADAPTER: "false"
      MCP_SERVER_URL: http://mcp-server:8080/mcp/
      MCP_AUTHORING_URL: http://mcp-server:8080/admin
      MCP_AUTHORING_TOKEN: ${AUTHORING_TOKEN:-}
      MCP_TIMEOUT_SECONDS: ${MCP_TIMEOUT_SECONDS:-5}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-3.1-flash-live-preview}
      GEMINI_LIVE_VOICE: ${GEMINI_LIVE_VOICE:-Kore}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-false}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      FOUNDRY_ENDPOINT: ${FOUNDRY_ENDPOINT:-}
      FOUNDRY_MODEL_DEPLOYMENT: ${FOUNDRY_MODEL_DEPLOYMENT:-}
      FOUNDRY_SCOPE: ${FOUNDRY_SCOPE:-https://ai.azure.com/.default}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
    ports:
      - "8000:8080"
    volumes:
      - agent-data:/data
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  mcp-server:
    build:
      context: .
      dockerfile: mcp_learning_server/Dockerfile
    environment:
      MCP_PORT: "8080"
      MCP_PROGRESS_PATH: /data/student_progress.json
      MCP_CONTENT_AUTHORING_PATH: /data/content_authoring.json
      MCP_PROGRESS_BACKEND: local
      MCP_AUTHORING_TOKEN: ${AUTHORING_TOKEN:-}
      MCP_ALLOWED_HOSTS: "mcp-server:8080"
    ports:
      - "8001:8080"
    volumes:
      - mcp-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  agent-data:
  mcp-data:
